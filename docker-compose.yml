# HumbleMark full stack: Postgres + Strapi CMS + Next.js storefront.
#
# Plain Docker:  copy .env.example to .env, fill it in, then:
#                docker compose up --build
#
# Coolify:       add this repo as a "Docker Compose" resource and set the same
#                variables in the Coolify UI. On a real VPS you can remove the
#                `ports:` blocks and attach domains through Coolify's proxy.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-humblemark}
      POSTGRES_USER: ${DATABASE_USERNAME:-humblemark}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?set DATABASE_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USERNAME:-humblemark} -d ${DATABASE_NAME:-humblemark}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  cms:
    build: ./cms
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "1337"
      URL: ${PUBLIC_CMS_URL:-http://localhost:1337}
      APP_KEYS: ${APP_KEYS:?set APP_KEYS in .env}
      API_TOKEN_SALT: ${API_TOKEN_SALT:?set API_TOKEN_SALT in .env}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?set ADMIN_JWT_SECRET in .env}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:?set TRANSFER_TOKEN_SALT in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_NAME: ${DATABASE_NAME:-humblemark}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-humblemark}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_SSL: "false"
    volumes:
      - cms-uploads:/app/public/uploads
    ports:
      - "1337:1337"

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_STRAPI_URL: ${PUBLIC_CMS_URL:-http://localhost:1337}
    restart: unless-stopped
    depends_on:
      - cms
    environment:
      NODE_ENV: production
      STRAPI_INTERNAL_URL: http://cms:1337
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN:-}
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  cms-uploads:
